<!DOCTYPE html>
<html>
<head>
    <title>File Compressor</title>
</head>

<body>

<h1>File Compressor</h1>

<input type="file" id="file">

<br><br>

<button id="compressBtn">Compress</button>
<button id="decompressBtn">Decompress</button>

<script>
console.log("JS LOADED"); // DEBUG

const BASE_URL = window.location.origin;

document.getElementById("compressBtn").addEventListener("click", () => {
    console.log("Compress clicked");

    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Select a file first!");
        return;
    }

    let form = new FormData();
    form.append("file", file);

    fetch(BASE_URL + "/compress", {
        method: "POST",
        body: form
    })
    .then(res => {
        if (!res.ok) throw new Error("Upload failed");
        return res.blob();
    })
    .then(blob => {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "compressed.qzip";
        a.click();
    })
    .catch(err => {
        alert("Error: " + err.message);
        console.error(err);
    });
});

document.getElementById("decompressBtn").addEventListener("click", () => {
    console.log("Decompress clicked");

    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Select a file first!");
        return;
    }

    let form = new FormData();
    form.append("file", file);

    fetch(BASE_URL + "/decompress", {
        method: "POST",
        body: form
    })
    .then(res => {
        if (!res.ok) throw new Error("Upload failed");
        return res.blob();
    })
    .then(blob => {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "decompressed.txt";
        a.click();
    })
    .catch(err => {
        alert("Error: " + err.message);
        console.error(err);
    });
});
</script>

</body>
</html>
